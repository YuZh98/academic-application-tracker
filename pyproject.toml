# Project tooling config. Build/packaging metadata is intentionally absent —
# the project is a Streamlit app, not a published package; install via
# requirements.txt + venv per GUIDELINES §1.

[tool.ruff]
target-version = "py314"
line-length = 100
extend-exclude = [
    "docs",       # contains screenshot seed snippets, not source
    "exports",    # generated markdown output
    "__pycache__",
    ".venv",
]

[tool.ruff.lint]
# Pyflakes (F), pycodestyle errors (E) and warnings (W). A deliberately
# tight starter set — extend in a follow-up once the cadence is comfortable.
# `I` (isort) is intentionally excluded for now: enabling it would reformat
# 9 import blocks across the codebase, scope creep for this PR. Add it
# alongside the format-the-world reformat in a follow-up.
select = ["E", "F", "W"]
# E501 (line-too-long) is not enforced yet; existing code reaches 224 chars
# and a format-the-world reformat is a separate PR.
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
# Format is configured but NOT yet enforced via CI / pre-commit. When the
# 14-file reformat lands as its own PR, add `ruff-format` to the hook list.

[tool.pyright]
# Phase 7 cleanup CL1: type-check fence in CI. Matches PR #22's working
# point ("basic" mode) — strict would require widespread additional
# annotations and is out of scope here. Re-runs of pyright against this
# config must stay clean for every subsequent PR (CI gate).
pythonVersion = "3.14"
typeCheckingMode = "basic"
# Scope to project source + tests. Top-level files like requirements.txt,
# pyproject.toml itself, and CI configs aren't Python so don't need
# explicit include — pyright's default file discovery handles them, but
# being explicit keeps the type-check surface predictable across CI fresh
# clones and local runs.
include = [
    "app.py",
    "config.py",
    "database.py",
    "exports.py",
    "pages",
    "tests",
]
# .venv (local virtualenv) and __pycache__ are auto-discovered junk; docs
# contains screenshot seed snippets, not source; exports is generated
# markdown output (.gitignored locally but a fresh CI clone may still see
# stub directories in some setups).
exclude = [
    ".venv",
    "**/__pycache__",
    "docs",
    "exports",
    "build",
    "dist",
]
