name: Bug report
description: Report a bug or unexpected behaviour in the app
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. For security vulnerabilities, please use the [security advisory channel](../../security/advisories/new) instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug you encountered.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: e.g. 3.12.4
  - type: input
    id: streamlit-version
    attributes:
      label: Streamlit version
      placeholder: e.g. 1.57.0
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 14.5 / Ubuntu 24.04 / Windows 11
  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      description: Paste any relevant logs or traceback here.
      render: shell
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight
      options:
        - label: I have searched existing issues to make sure this is not a duplicate.
          required: true
        - label: I am running a recent release of the app.
          required: true
